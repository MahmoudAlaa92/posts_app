name: posts_app
description: A Flutter Posts App built with Clean Architecture, BLoC, Hive & Dio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Local Storage
  hive_flutter: ^1.1.0

  # Dependency Injection
  get_it: ^7.6.7

  # Navigation
  go_router: ^13.2.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/